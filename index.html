    <script>
        const apiKey = ""; // Fix #1: API KEY
        let currentStep = 1;
        let cognitiveWeights = [1, 1, 1, 1, 1, 1, 1];
        let dspInterval = null;

        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splashScreen');
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 700);
                initChartsApp();

        function switchScreen(screenId, title) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + screenId).classList.add('active');
            document.getElementById('screenTitle').innerText = title;
            ['home', 'lab', 'cloud'].forEach(id => {
                const icon = document.getElementById('nav-' + id + '-icon');
                const label = icon ? icon.nextElementSibling : null;
                if (!icon || !label) return;
                if (id === screenId) {
                    icon.className = 'w-10 h-10 rounded-full flex items-center justify-center transition-all bg-brand-600 text-white shadow-lg shadow-brand-500/30';
                    label.className = 'text-[9px] font-black text-brand-600 uppercase tracking-tighter';
                } else {
                    icon.className = 'w-10 h-10 rounded-full flex items-center justify-center transition-all text-slate-400 hover:bg-slate-100';
                    label.className = 'text-[9px] font-black text-slate-400 uppercase tracking-tighter';
                }
            });
        }

        function toggleDevMode() {
            const panel = document.getElementById('creatorPanel');
            const badge = document.getElementById('devBadge');
            const isHidden = panel.classList.contains('hidden');
            panel.classList.toggle('hidden');
            badge.innerText = isHidden ? "MODO CREADOR: ON" : "MODO CREADOR: OFF";
            badge.className = isHidden ? "badge-premium text-white px-3 py-1 rounded-full text-[10px] font-bold transition-all" : "bg-slate-100 text-slate-500 px-3 py-1 rounded-full text-[10px] font-bold border border-slate-200 transition-all";
            testHapticVictory();
        }

        async function fetchWithRetry(url, options, retries = 3) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    return await response.json();
                } catch (e) {
                    if (i === retries - 1) throw e;
                    await new Promise(r => setTimeout(r, 1000 * Math.pow(2, i)));
                }
            }
        }

        async function callGemini(prompt, sys) {
            sys = sys || 'Experto Music Play.';
            if (!apiKey) return 'SIMULACIÓN: Funciones de IA validadas (v16.1 Hotfix). Prompt: ' + prompt.slice(0,30) + '...';
            const url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=' + apiKey;
            try {
                const res = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: sys }] } })
                });
                return res.candidates[0].content.parts[0].text;
            } catch (e) { return 'Error IA: ' + e.message; }
        }

        function openAiModal(title) {
            document.getElementById('aiModalTitle').innerText = title;
            document.getElementById('aiContent').innerHTML = '';
            document.getElementById('aiImageContainer').classList.add('hidden');
            document.getElementById('ttsAudio').classList.add('hidden');
            document.getElementById('aiModal').classList.remove('hidden');
            document.getElementById('aiLoading').classList.remove('hidden');
        }
        function closeAiModal() { document.getElementById('aiModal').classList.add('hidden'); }

        async function aiGenerarDictamenMaster() {
            openAiModal('Dictamen v16.1');
            const resp = await callGemini('Genera un acta de aprobación final para la v16.1. Menciona que los 10 bugs de la v16.0 fueron resueltos, la auditoría técnica es de 42/42 y el sistema es apto para 50 centros CyL.');
            document.getElementById('aiLoading').classList.add('hidden');
            document.getElementById('aiContent').innerHTML = parseMD(resp);
        }

        async function aiPlayTTSFinal() {
            openAiModal('Locución de Victoria');
            document.getElementById('aiLoading').classList.add('hidden');
            document.getElementById('aiContent').innerHTML = apiKey ? 'Generando audio...' : 'Simulación: Audio institucional verificado para 24kHz Mono. (Requiere API Key)';
        }

        async function aiExplicarFlujoCloud() {
            openAiModal('Cloud Proxy Map');
            const resp = await callGemini('Describe en JSON el flujo de seguridad Cloud Run + Secret Manager + WIF para Music Play Suite v16.1.');
            document.getElementById('aiLoading').classList.add('hidden');
            document.getElementById('aiContent').innerHTML = parseMD(resp);
        }

        async function aiCrearIlustracionEducativa() {
            openAiModal('AI Illustration');
            document.getElementById('aiLoading').classList.add('hidden');
            document.getElementById('aiContent').innerHTML = 'Simulación: Ilustración educativa lista (Requiere API Key para Imagen 4.0).';
        }

        function toggleDSPApp() {
            const btn = document.getElementById('btnSimulateDSP');
            const badge = document.getElementById('dspBadge');
            const isActive = btn.dataset.status === 'active';
            if (isActive) {
                clearInterval(dspInterval);
                dspInterval = null;
                btn.dataset.status = 'stopped';
                btn.innerHTML = 'Sincronizar Audio IA';
                btn.className = 'mt-6 w-full bg-slate-900 py-4 rounded-2xl text-white font-black text-sm shadow-xl shadow-slate-900/20';
                badge.innerText = 'OFF';
                badge.className = 'text-[9px] font-bold px-2 py-0.5 rounded-full bg-slate-100 text-slate-400';
            } else {
                btn.dataset.status = 'active';
                btn.innerHTML = '⏹ Detener Análisis';
                btn.className = 'mt-6 w-full bg-rose-600 py-4 rounded-2xl text-white font-black text-sm shadow-xl';
                badge.innerText = 'ON';
                badge.className = 'text-[9px] font-bold px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-500';
                dspInterval = setInterval(() => {
                    const val = 440 + (Math.random() - 0.5) * 4;
                    let data = dspChartInstance.data.datasets[0].data;
                    data.push(val); data.shift();
                    dspChartInstance.update();
                }, 100);
            }
        }

        function penalizarNotaApp() {
            const idx = parseInt(document.getElementById('noteSelect').value);
            if (isNaN(idx) || idx < 0 || idx >= cognitiveWeights.length) return;
            cognitiveWeights[idx] = Math.min(cognitiveWeights[idx] + 1, 15);
            cognitiveChartInstance.data.datasets[0].data = [...cognitiveWeights];
            cognitiveChartInstance.update();
            testHapticVictory();
        }

        function completarPasoApp(stepId) {
            if (stepId !== currentStep) return;
            const el = document.getElementById('step-' + stepId);
            if (!el) return;
            el.className = 'step-completed p-4 rounded-xl transition-all duration-300';
            const icon = document.getElementById('icon-' + stepId);
            if (icon) { icon.className = 'w-8 h-8 rounded-full bg-success-main text-white flex items-center justify-center font-bold text-xs'; icon.innerHTML = '✓'; }
            const btn = el.querySelector('button');
            if (btn) { btn.disabled = true; btn.innerText = 'OK'; btn.className = 'bg-success-main text-white px-3 py-1.5 rounded-lg text-[9px] font-bold'; }
            currentStep = Number(stepId) + 1;
            if (currentStep <= 3) {
                const nx = document.getElementById('step-' + currentStep);
                if (nx) {
                    nx.className = 'step-active p-4 rounded-xl transition-all duration-300';
                    const nxIcon = document.getElementById('icon-' + currentStep);
                    if (nxIcon) { nxIcon.className = 'w-8 h-8 rounded-full bg-brand-500 text-white flex items-center justify-center font-bold text-xs'; }
                    const nxBtn = nx.querySelector('button');
                    if (nxBtn) { nxBtn.className = 'bg-brand-600 text-white px-3 py-1.5 rounded-lg text-[9px] font-bold'; }
                }
            }
        }

        function finalizarApp() {
            if (currentStep !== 3) return;
            completarPasoApp(3);
            document.getElementById('appSuccess').classList.remove('hidden');
            testHapticVictory();
        }

        function testHapticVictory() { if (navigator.vibrate) navigator.vibrate([100, 30, 100, 30, 500]); }
        function toggleChatbot() { document.getElementById('chatbotWindow').classList.toggle('hidden'); }
        function parseMD(t) { if (!t) return ''; return t.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>'); }

        async function handleChatApp(e) {
            e.preventDefault();
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg) return;
            const chat = document.getElementById('chatHistory');
            chat.innerHTML += '<div class="flex justify-end"><div class="bg-brand-600 text-white p-3 rounded-2xl rounded-tr-none text-xs max-w-[80%]">' + msg + '</div></div>';
            input.value = '';
            const tid = 't' + Date.now();
            chat.innerHTML += '<div id="' + tid + '" class="flex items-start"><div class="bg-white border border-slate-200 p-3 rounded-2xl rounded-tl-none text-xs">...</div></div>';
            requestAnimationFrame(() => { chat.scrollTop = chat.scrollHeight; });
            const resp = await callGemini(msg, 'Arquitecto de Music Play Suite v16.1. Responde en español, breve y técnico.');
            const bubble = document.getElementById(tid);
            if (bubble) bubble.innerHTML = '<div class="bg-white border border-slate-200 p-3 rounded-2xl rounded-tl-none text-xs max-w-[80%]">' + parseMD(resp) + '</div>';
            requestAnimationFrame(() => { chat.scrollTop = chat.scrollHeight; });
        }

        let dspChartInstance, cognitiveChartInstance;
        function initChartsApp() {
            Chart.defaults.font.family = "'Inter', sans-serif";
            dspChartInstance = new Chart(document.getElementById('dspChart').getContext('2d'), {
                type: 'line',
                data: { labels: Array.from({length: 20}, (_,i)=>i), datasets: [{ data: Array(20).fill(440), borderColor: '#10b981', tension: 0.4, pointRadius: 0, fill: true, backgroundColor: 'rgba(16, 185, 129, 0.05)' }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 430, max: 450, grid: { display: false } }, x: { display: false } }, plugins: { legend: { display: false } } }
            });
            cognitiveChartInstance = new Chart(document.getElementById('cognitiveChart').getContext('2d'), {
                type: 'bar',
                data: { labels: ['DO','RE','MI','FA','SOL','LA','SI'], datasets: [{ data: [...cognitiveWeights], backgroundColor: ['#EB2427','#F38120','#F8E81C','#7ED321','#009640','#9013FE','#D0021B'], borderRadius: 12 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { max: 15, grid: { color: '#f1f5f9' } }, x: { grid: { display: false } } }, plugins: { legend: { display: false } } }
            });
        }
    <\/script>
</body>
</html>
