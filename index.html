<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Music Play! Suite v16.1 — Web App Profesional</title>
    <meta name="theme-color" content="#0f172a">
    <meta name="description" content="Ecosistema Neuroeducativo Musical v16.1. Entrega final certificada con IA Edge y Cloud Segura.">
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50:'#eff6ff',100:'#dbeafe',500:'#3b82f6',600:'#2563eb',900:'#1e3a8a',dark:'#0f172a' },
                        success: { light:'#ecfdf5',main:'#10b981',dark:'#047857' },
                        cloud: { light:'#e0f2fe',main:'#0284c7',dark:'#075985' },
                        gemini: { light:'#f3e8ff',main:'#a855f7',dark:'#7e22ce' }
                    },
                    borderRadius: { 'app': '1.25rem' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; overflow-x: hidden; }
        .chart-container { position: relative; width: 100%; height: 260px; }
        .view-section { display: none; animation: fadeIn 0.3s ease-out forwards; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .loader { border: 3px solid #e2e8f0; border-top: 3px solid #3b82f6; border-radius: 50%; width: 28px; height: 28px; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .glow-success { box-shadow: 0 0 20px rgba(16,185,129,0.25); }
        .nav-active { background-color: #2563eb !important; color: #fff !important; font-weight: 700 !important; }
        .nav-inactive { color: #94a3b8; font-weight: 500; }
        .nav-inactive:hover { background-color: #1e293b; color: #e2e8f0; }
    </style>
</head>
<body class="flex flex-col min-h-screen">
